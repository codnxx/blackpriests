<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>검은 사제들 적성 검사</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&display=swap');

    :root {
      --bg: #08080f;
      --surface: #10101a;
      --border: #2a2a3a;
      --text: #ddd5c8;
      --text-muted: #7a7080;

      --red:    #c0392b;
      --red-glow: rgba(192, 57, 43, 0.25);
      --shadow: #7d3c98;
      --shadow-glow: rgba(125, 60, 152, 0.25);
      --sun:    #d4ac0d;
      --sun-glow: rgba(212, 172, 13, 0.25);
      --scale:  #2e86c1;
      --scale-glow: rgba(46, 134, 193, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* 별 배경 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 5%,  rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 95%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    /* ── 헤더 ── */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header-deco {
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    header h1 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 700;
      letter-spacing: 4px;
      line-height: 1.4;
      color: #f0eae0;
      text-shadow: 0 0 40px rgba(255,255,255,0.08);
    }

    header p {
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.8;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span { font-size: 16px; color: var(--text-muted); }

    /* ── 진행 바 ── */
    #progress-wrap {
      margin-bottom: 32px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c3483, #c0392b);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      margin-bottom: 20px;
    }

    /* ── 질문 ── */
    .question-num {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .question-text {
      font-size: clamp(15px, 2.5vw, 18px);
      font-weight: 600;
      line-height: 1.7;
      color: #f0eae0;
      margin-bottom: 28px;
    }

    /* ── 선택지 ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .option-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .option-btn:hover {
      border-color: #555;
      color: #fff;
      transform: translateX(4px);
    }

    .option-btn.selected {
      border-color: #888;
      background: rgba(255,255,255,0.05);
    }

    .option-label {
      display: inline-block;
      width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      border-radius: 50%;
      background: var(--border);
      font-size: 11px;
      margin-right: 10px;
      flex-shrink: 0;
    }

    /* ── 내비 버튼 ── */
    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn:hover { border-color: #666; color: #fff; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-primary {
      background: rgba(255,255,255,0.05);
      border-color: #555;
    }
    .btn-primary:hover { background: rgba(255,255,255,0.1); }

    /* ── 인트로 / 결과 공통 숨김 ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── 인트로 화면 ── */
    #intro .intro-gods {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 28px 0;
    }

    .god-pill {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.5;
    }

    .god-pill.red    { border-color: var(--red);    background: var(--red-glow); }
    .god-pill.shadow { border-color: var(--shadow);  background: var(--shadow-glow); }
    .god-pill.sun    { border-color: var(--sun);    background: var(--sun-glow); }
    .god-pill.scale  { border-color: var(--scale);  background: var(--scale-glow); }

    .god-pill .god-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .god-pill.red    .god-name { color: var(--red); }
    .god-pill.shadow .god-name { color: var(--shadow); }
    .god-pill.sun    .god-name { color: var(--sun); }
    .god-pill.scale  .god-name { color: var(--scale); }

    .god-pill .god-role { color: var(--text-muted); font-size: 12px; }

    .start-btn {
      width: 100%;
      padding: 16px;
      border: 1px solid #555;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: #f0eae0;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .start-btn:hover { background: rgba(255,255,255,0.09); border-color: #aaa; }

    /* ── 결과 화면 ── */
    #result {
      text-align: center;
    }

    .result-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 99px;
      font-size: 12px;
      letter-spacing: 3px;
      margin-bottom: 20px;
      border: 1px solid;
    }

    .result-title {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .result-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .result-desc {
      font-size: 14px;
      line-height: 1.9;
      color: var(--text);
      text-align: left;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .result-skill-box {
      border-radius: 10px;
      padding: 20px 24px;
      text-align: left;
      margin-bottom: 24px;
      border: 1px solid;
    }

    .result-skill-box h3 {
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .skill-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skill-item {
      font-size: 13px;
      line-height: 1.7;
      padding: 10px 14px;
      border-radius: 6px;
      background: rgba(0,0,0,0.3);
    }

    .skill-name { font-weight: 700; margin-bottom: 2px; }
    .skill-desc { color: var(--text-muted); font-size: 12px; }

    /* 속성별 결과 컬러 */
    .result-red .result-badge    { color: var(--red);    border-color: var(--red);    background: var(--red-glow); }
    .result-red .result-title    { color: var(--red); text-shadow: 0 0 30px var(--red-glow); }
    .result-red .result-skill-box { border-color: var(--red); background: var(--red-glow); }
    .result-red .result-skill-box h3 { color: var(--red); }

    .result-shadow .result-badge    { color: var(--shadow);  border-color: var(--shadow);  background: var(--shadow-glow); }
    .result-shadow .result-title    { color: var(--shadow); text-shadow: 0 0 30px var(--shadow-glow); }
    .result-shadow .result-skill-box { border-color: var(--shadow); background: var(--shadow-glow); }
    .result-shadow .result-skill-box h3 { color: var(--shadow); }

    .result-sun .result-badge    { color: var(--sun);    border-color: var(--sun);    background: var(--sun-glow); }
    .result-sun .result-title    { color: var(--sun); text-shadow: 0 0 30px var(--sun-glow); }
    .result-sun .result-skill-box { border-color: var(--sun); background: var(--sun-glow); }
    .result-sun .result-skill-box h3 { color: var(--sun); }

    .result-scale .result-badge    { color: var(--scale);  border-color: var(--scale);  background: var(--scale-glow); }
    .result-scale .result-title    { color: var(--scale); text-shadow: 0 0 30px var(--scale-glow); }
    .result-scale .result-skill-box { border-color: var(--scale); background: var(--scale-glow); }
    .result-scale .result-skill-box h3 { color: var(--scale); }

    /* 점수 바 */
    .score-bars { margin-bottom: 24px; text-align: left; }
    .score-bars h3 { font-size: 12px; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 14px; }
    .score-row { margin-bottom: 10px; }
    .score-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
    .score-label .sname { color: var(--text); }
    .score-label .sval  { color: var(--text-muted); }
    .score-bg { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
    .fill-red    { background: var(--red); }
    .fill-shadow { background: var(--shadow); }
    .fill-sun    { background: var(--sun); }
    .fill-scale  { background: var(--scale); }

    .retry-btn {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .retry-btn:hover { border-color: #666; color: var(--text); }

    /* 애니메이션 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease forwards; }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      #intro .intro-gods { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ══ 인트로 화면 ══ -->
  <div id="intro" class="screen active fade-in">
    <header>
      <p class="header-deco">aptitude test</p>
      <h1>검은 사제들<br>적성 검사</h1>
      <p>당신의 캐릭터에게 어울리는 신의 속성을 찾아드립니다.<br>직감에 따라 솔직하게 답해 주세요.</p>
    </header>

    <div class="card">
      <div class="intro-gods">
        <div class="god-pill red">
          <div class="god-name">붉은 달의 신</div>
          <div class="god-role">현실 피해 · 무기 전투</div>
        </div>
        <div class="god-pill shadow">
          <div class="god-name">그림자의 신</div>
          <div class="god-role">정신 피해 · 마법·이능력</div>
        </div>
        <div class="god-pill sun">
          <div class="god-name">태양의 신</div>
          <div class="god-role">체력 회복 · 전방위 전투</div>
        </div>
        <div class="god-pill scale">
          <div class="god-name">천칭의 신</div>
          <div class="god-role">전략 · 전방위 전투</div>
        </div>
      </div>
      <div class="divider"><span>✦</span></div>
      <p style="font-size:13px; color:var(--text-muted); line-height:1.8; margin-bottom:24px;">
        총 10개의 질문으로 구성되어 있습니다.<br>
        결과는 참고용이며, 최종 선택은 플레이어 본인의 몫입니다.
      </p>
      <button class="start-btn" onclick="startQuiz()">검 사 시 작</button>
    </div>
  </div>

  <!-- ══ 퀴즈 화면 ══ -->
  <div id="quiz" class="screen">
    <header>
      <p class="header-deco">aptitude test</p>
      <h1>검은 사제들<br>적성 검사</h1>
    </header>

    <div id="progress-wrap">
      <div class="progress-info">
        <span id="q-counter">1 / 10</span>
        <span id="q-percent">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="card fade-in" id="q-card">
      <p class="question-num" id="q-num">QUESTION 01</p>
      <p class="question-text" id="q-text"></p>
      <div class="options" id="options"></div>
    </div>

    <div class="nav-row">
      <button class="btn" id="btn-prev" onclick="prevQ()" disabled>← 이전</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQ()" disabled>다음 →</button>
    </div>
  </div>

  <!-- ══ 결과 화면 ══ -->
  <div id="result" class="screen">
    <header>
      <p class="header-deco">result</p>
      <h1>검은 사제들<br>적성 검사</h1>
    </header>
    <div class="card fade-in" id="result-card">
      <!-- JS로 채움 -->
    </div>
    <button class="retry-btn" onclick="restart()">↺ 다시 검사하기</button>
  </div>

</div>

<script>
  // ──────────────────────────────────────────────
  // 질문 데이터
  // key: r=붉은달, s=그림자, u=태양, c=천칭
  // ──────────────────────────────────────────────
  const QUESTIONS = [
    {
      text: "당신의 캐릭터가 가장 두려워하는 것은?",
      opts: [
        { label: "자신이 남긴 상처가, 언젠가 돌아온다는 것", key: "r" },
        { label: "자신의 존재가 아무 의미도 없다는 것", key: "s" },
        { label: "곁에 있던 누군가가 자신 때문에 무너지는 것", key: "u" },
        { label: "세상이 불공평한 채로 그냥 끝나버리는 것", key: "c" },
      ]
    },
    {
      text: "처음 만난 사람에게 캐릭터가 보여주는 모습은?",
      opts: [
        { label: "말보다 행동으로 먼저 보여준다. 증명이 먼저다.", key: "r" },
        { label: "관찰하고 기다린다. 먼저 다가가는 일은 없다.", key: "s" },
        { label: "상대가 편하도록 먼저 말을 건넨다.", key: "u" },
        { label: "필요한 것만 묻고, 필요한 것만 답한다.", key: "c" },
      ]
    },
    {
      text: "캐릭터에게 있어 '동료'란 어떤 존재인가요?",
      opts: [
        { label: "함께 싸우는 전우. 약점을 보여줄 수 있는 유일한 자리.", key: "r" },
        { label: "필요할 때 신뢰할 수 있는 관계. 그 이상도 이하도 없다.", key: "s" },
        { label: "지키고 싶은 사람. 자신이 쓰러져도 살아남아야 할 존재.", key: "u" },
        { label: "각자의 역할을 다하는 관계. 감정보다 기능이 우선이다.", key: "c" },
      ]
    },
    {
      text: "선택의 기로에 섰을 때 캐릭터가 따르는 것은?",
      opts: [
        { label: "본능. 생각보다 몸이 먼저 반응한다.", key: "r" },
        { label: "계산. 이득과 손해를 먼저 따진다.", key: "s" },
        { label: "감정. 누가 더 아프고 힘든지를 본다.", key: "u" },
        { label: "원칙. 옳고 그름은 언제나 분명하다.", key: "c" },
      ]
    },
    {
      text: "캐릭터가 혼자 있을 때 자주 하는 것은?",
      opts: [
        { label: "무언가를 단련하거나, 몸을 움직인다.", key: "r" },
        { label: "조용히 생각에 잠기거나, 주변을 관찰한다.", key: "s" },
        { label: "주변 사람들이 괜찮은지 떠올리거나 안부를 확인한다.", key: "u" },
        { label: "지난 일의 흐름과 득실을 정리한다.", key: "c" },
      ]
    },
    {
      text: "캐릭터가 신의 힘을 빌리는 가장 솔직한 이유는?",
      opts: [
        { label: "힘이 없으면 아무것도 지킬 수 없으니까.", key: "r" },
        { label: "수단이 뭐든 상관없다. 목적에 닿을 수 있으면 된다.", key: "s" },
        { label: "신이 원하는 것과 내가 원하는 것이 같다고 느끼기 때문에.", key: "u" },
        { label: "신과의 관계는 계약에 가깝다. 서로가 필요한 것을 주고받는 것.", key: "c" },
      ]
    },
    {
      text: "캐릭터가 가장 기억하고 싶은 순간은?",
      opts: [
        { label: "모든 것을 걸고 싸워 끝내 이긴 그 순간.", key: "r" },
        { label: "아무도 몰랐던 진실을 혼자 알게 된 순간.", key: "s" },
        { label: "자신의 손으로 누군가의 생명이 살아난 순간.", key: "u" },
        { label: "혼돈 속에서 판단 하나로 질서를 되찾은 순간.", key: "c" },

    },

  // ──────────────────────────────────────────────
  // 결과 데이터
  // ──────────────────────────────────────────────
  const RESULTS = {
    r: {

      badge: "붉은 달의 신",

      desc: "당신의 캐릭터는 붉은 달의 신과 가장 잘 어울립니다.\n\n강인한 의지와 거침없는 전투력을 지닌 당신은 직접 무기를 들고 악령을 상대하는 최전방 전사입니다. 붉게 물든 시선으로 적을 꿰뚫어 보며, 물리적 상흔을 남기는 현실 피해로 전장을 압도합니다.\n\n당신의 전투는 화려하지 않아도 됩니다. 끝낼 의지 하나면 충분합니다.",

    s: {

      desc: "당신의 캐릭터는 그림자의 신과 가장 잘 어울립니다.\n\n신비롭고 내면 깊은 곳에 어둠을 감춘 당신은 마법과 이능력이라는 환상을 무기로 삼는 자입니다. 적의 정신을 파고들어 내부에서부터 무너뜨리는 정신 피해로 아무도 예측할 수 없는 전투를 펼칩니다.\n\n조용히 관찰하고, 결정적인 순간에만 손을 뻗습니다. 그것으로 충분합니다.",
      skills: [
        { tag: "", name: "기본 공격", desc: "수치 3~5 / 수치만큼의 정신 피해를 가한다." },
        { tag: "", name: "Umbra (움브라)", desc: "수치 3 / 수치만큼의 정신 피해를 가한다. 합 겨루기 없이 적중 시 2배의 정신 피해를 가한다." },
        { tag: "전용", name: "Ater (아테르)", desc: "수치 9~14 / 수치만큼의 정신 피해를 가한다. 수치가 12 미만일 경우 승패와 상관없이 해당 스킬을 재발동한다. 최대 발동 횟수 3회. 보석 강화 불가." },
      ]
    },
    u: {
      cls: "result-sun",
      badge: "태양의 신",
      title: "태양의 사제",
      subtitle: "온기를 나누는 신에게 선택받은 자",
      desc: "당신의 캐릭터는 태양의 신과 가장 잘 어울립니다.\n\n자비롭고 포용적인 당신은 무기든, 마법이든, 이능력이든 가리지 않고 동료를 위해 모든 것을 활용하는 치유자입니다. 전장에서 쓰러져 가는 아군의 체력을 회복시키며 빛처럼 자리를 지킵니다.\n\n당신이 있다는 것만으로, 사제단의 생존율이 달라집니다.",
      skills: [
        { tag: "", name: "기본 공격", desc: "수치 1~3 / 수치만큼의 공통 피해를 가한다." },
        { tag: "", name: "Sol (솔)", desc: "수치 3~5 / 대상 한 명의 체력을 회복시킨다. 20% 확률로 전원 회복이 적용된다." },
        { tag: "전용", name: "Flavus (플라부스)", desc: "수치 15~30 / 수치만큼의 체력을 회복시킨다. 확정된 회복 수치를 선언 시 턴 소모 없이 원하는 대상을 지정해 회복할 수 있으며, 여러 대상에 수치를 나누어 적용 가능. 보석 강화 불가." },
      ]
    },
    c: {
      cls: "result-scale",
      badge: "천칭의 신",
      title: "천칭의 사제",
      subtitle: "끝없이 저울을 기울이는 신을 섬기는 자",
      desc: "당신의 캐릭터는 천칭의 신과 가장 잘 어울립니다.\n\n냉철하고 전략적인 당신은 언제나 악령에 맞서 가장 앞에서 판단하며 전장의 흐름을 주도합니다. 물리, 마법, 이능력 모두를 상황에 따라 유연하게 구사하며, 초기 체력 60으로 시작하는 강인한 내구력 또한 당신의 무기입니다.\n\n당신이 버티는 한, 전선은 무너지지 않습니다.",
      skills: [
        { tag: "", name: "기본 공격", desc: "수치 1~3 / 수치만큼의 공통 피해를 가한다." },
        { tag: "", name: "Libra (리브라)", desc: "수치 6 / 동전을 던져 결과에 따라 발동. 앞면: 방어력이 1 상승한다 (전투 종료까지 유지, 최대 5중첩). 뒷면: 현재 라운드 아군 1명의 대미지를 대신 입고, 자신의 방어력을 차감한다." },
        { tag: "전용", name: "Niveus (니베우스)", desc: "수치 8~13 / 현재 라운드 아군을 향한 최종 대미지를 25% 경감한다. 수치가 8일 경우 수치만큼의 공통 피해 추가, 13일 경우 수치 2배의 공통 피해를 추가로 입힌다. 보석 강화 불가." },
      ]
    },
  };

  const GOD_NAMES = {
    r: "붉은 달의 신",
    s: "그림자의 신",
    u: "태양의 신",
    c: "천칭의 신",
  };

  // ──────────────────────────────────────────────
  // 상태
  // ──────────────────────────────────────────────
  let current = 0;
  let answers = new Array(QUESTIONS.length).fill(null);
  // 각 질문마다 셔플된 선택지 순서 저장
  let shuffled = [];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startQuiz() {
    current = 0;
    answers = new Array(QUESTIONS.length).fill(null);
    shuffled = QUESTIONS.map(q => shuffle(q.opts));
    showScreen('quiz');
    renderQuestion();
  }

  function renderQuestion() {
    const q = QUESTIONS[current];
    const opts = shuffled[current];
    const labels = ['A', 'B', 'C', 'D'];

    document.getElementById('q-num').textContent = `QUESTION ${String(current + 1).padStart(2, '0')}`;
    document.getElementById('q-text').textContent = q.text;
    document.getElementById('q-counter').textContent = `${current + 1} / ${QUESTIONS.length}`;
    const pct = Math.round((current / QUESTIONS.length) * 100);
    document.getElementById('q-percent').textContent = pct + '%';
    document.getElementById('prog-fill').style.width = pct + '%';

    const container = document.getElementById('options');
    container.innerHTML = '';

    opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (answers[current] === opt.key ? ' selected' : '');
      btn.innerHTML = `<span class="option-label">${labels[i]}</span>${opt.label}`;
      btn.onclick = () => selectOption(opt.key, btn);
      container.appendChild(btn);
    });

    document.getElementById('btn-prev').disabled = current === 0;
    document.getElementById('btn-next').disabled = answers[current] === null;

    const card = document.getElementById('q-card');
    card.classList.remove('fade-in');
    void card.offsetWidth;
    card.classList.add('fade-in');
  }

  function selectOption(key, btn) {
    answers[current] = key;
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('btn-next').disabled = false;
  }

  function nextQ() {
    if (answers[current] === null) return;
    if (current < QUESTIONS.length - 1) {
      current++;
      renderQuestion();
    } else {
      showResult();
    }
  }

  function prevQ() {
    if (current > 0) {
      current--;
      renderQuestion();
    }
  }

  function showResult() {
    // 집계
    const score = { r: 0, s: 0, u: 0, c: 0 };
    answers.forEach(k => { if (k) score[k]++; });
    const winner = Object.entries(score).sort((a, b) => b[1] - a[1])[0][0];
    const res = RESULTS[winner];
    const total = QUESTIONS.length;
    const maxScore = Math.max(...Object.values(score));

    // 진행 바 업데이트
    document.getElementById('q-percent').textContent = '100%';
    document.getElementById('prog-fill').style.width = '100%';

    // 결과 카드 생성
    const card = document.getElementById('result-card');
    card.className = `card fade-in ${res.cls}`;

    const descLines = res.desc.split('\n\n').map(line => `<p style="margin-bottom:10px;">${line}</p>`).join('');

    const skillsHTML = res.skills.map(sk => `
      <div class="skill-item">
        <div class="skill-name">
          ${sk.tag ? `<span style="font-size:10px;font-weight:400;letter-spacing:1px;opacity:0.7;border:1px solid currentColor;border-radius:4px;padding:1px 6px;margin-right:6px;vertical-align:middle;">${sk.tag}</span>` : ''}${sk.name}
        </div>
        <div class="skill-desc">${sk.desc}</div>
      </div>
    `).join('');

    const scoreBarsHTML = Object.entries(score)
      .sort((a, b) => b[1] - a[1])
      .map(([k, v]) => {
        const pct = Math.round((v / total) * 100);
        const fillCls = { r: 'fill-red', s: 'fill-shadow', u: 'fill-sun', c: 'fill-scale' }[k];
        return `
          <div class="score-row">
            <div class="score-label">
              <span class="sname">${GOD_NAMES[k]}</span>
              <span class="sval">${v}점</span>
            </div>
            <div class="score-bg">
              <div class="score-fill ${fillCls}" style="width:${pct}%"></div>
            </div>
          </div>`;
      }).join('');

    card.innerHTML = `
      <div style="text-align:center; margin-bottom:24px;">
        <span class="result-badge">${res.badge}</span>
        <div class="result-title">${res.title}</div>
        <div class="result-subtitle">${res.subtitle}</div>
      </div>

      <div class="result-desc">${descLines}</div>

      <div class="result-skill-box">
        <h3>✦ 보유 스킬</h3>
        <div class="skill-row">${skillsHTML}</div>
      </div>

      <div class="score-bars">
        <h3>✦ 속성 분포</h3>
        ${scoreBarsHTML}
      </div>
    `;

    showScreen('result');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function restart() {
    showScreen('intro');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
